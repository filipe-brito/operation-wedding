<svg width="552" height="497" viewBox="0 0 552 497" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
    #logo_animated {
      animation: fadeIn 1.5s ease-out forwards;
    }

    #main_logo,
    #pulsing_heart,
    #heart_1,
    #heart_2,
    #heart_3 {
      transform-origin: center;
      transform-box: fill-box;
    }

    @keyframes shake {
      0%   { transform: translateX(0); }
      5%  { transform: translateX(-4px); }
      10%  { transform: translateX(4px); }
      15%  { transform: translateX(-4px); }
      20%  { transform: translateX(0); animation-timing-function: steps(1);}
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes pulsing {
      0% {
        transform: scale(1);
        opacity: 0.6; 
      }
      100% {
        transform: scale(10);
        opacity: 0;
      }
    }

    @keyframes slide-in-right {
      0% {
        opacity: 0;
        transform: translateX(0);
      }
      20% {
        opacity: 1;
      }
      50% {
        opacity: 1;
        transform: translateX(-138px);
        
      }
      70% {
        opacity: 0;
        transform: translateX(-138px);
        animation-timing-function: steps(1);
      }
    }

    @keyframes slide-in-left {
      0% {
        opacity: 0;
        transform: translateX(0);
      }
      20% {
        opacity: 1;
      }
      50% {
        opacity: 1;
        transform: translateX(138px);
        
      }
      70% {
        opacity: 0;
        transform: translateX(138px);
        animation-timing-function: steps(1);
      }
    }

    #pulsing_heart {
      animation: pulsing 2s infinite ease-out;
    }

    #pulsing_heart {
      animation-delay: 1s;
    }

    #heart_1 {
      animation: slide-in-left 2s infinite linear;
    }


    #heart_2 {
      animation: slide-in-right 2s infinite linear;
    }

    #main_logo {
      animation: shake 2s ease-in-out infinite;
      animation-delay: 1s;
    }
  </style>
<g id="logo_animated">
